services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://127.0.0.1:8000/}
      APP_ENV: ${APP_ENV:-development}
      TZ: ${TZ:-America/Sao_Paulo}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-classroombookings}
      DB_USER: ${DB_USER:-classroombookings}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      AUTO_BOOTSTRAP_DB: ${AUTO_BOOTSTRAP_DB:-1}
      INCLUDE_SEED: ${INCLUDE_SEED:-0}
      EXTEND_SEED_UNTIL: ${EXTEND_SEED_UNTIL:-}
      SEED_CSV_PATH: ${SEED_CSV_PATH:-}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-}
      SEED_ADMIN_USERS: ${SEED_ADMIN_USERS:-aux_coord,aux_doc}
      APP_FAKE_NOW: ${APP_FAKE_NOW:-}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - app_local:/var/www/html/local
      - app_uploads:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net

  db:
    image: mysql:8.4
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      MYSQL_DATABASE: ${DB_NAME:-classroombookings}
      MYSQL_USER: ${DB_USER:-classroombookings}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-root-password}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - app_net

  adminer:
    image: adminer:4
    profiles:
      - tools
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net

volumes:
  db_data:
  app_local:
  app_uploads:

networks:
  app_net:
